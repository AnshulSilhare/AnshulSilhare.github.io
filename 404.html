<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Anshul Silhare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f8fafc; --bg2: #ffffff;
  --surface: #ffffff;
  --border:  rgba(15,23,42,.08); --border2: rgba(15,23,42,.15);
  --accent:  #1e3a5f; --accent2: #0e7c6b;
  --text:    #0f172a; --text2: #475569; --text3: #94a3b8;
  --display: 'Syne', sans-serif;
  --body:    'DM Sans', sans-serif;
  --radius:  6px; --radius2: 12px;
}
body.dark {
  --bg: #0f172a; --bg2: #1e293b;
  --surface: #1e293b;
  --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.15);
  --text: #f8fafc; --text2: #cbd5e1; --text3: #64748b;
  --accent: #38bdf8; --accent2: #2dd4bf;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  transition: background 0.3s, color 0.3s;
}
.card {
  max-width: 500px;
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 3rem 2rem;
  text-align: center;
  box-shadow: 0 8px 32px rgba(15,23,42,.05);
}
.glitch-code {
  font-family: var(--display);
  font-size: 6rem;
  font-weight: 800;
  line-height: 1;
  color: var(--accent2);
  margin-bottom: 1rem;
}
.title {
  font-family: var(--display);
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 1rem;
}
.desc {
  font-size: 0.95rem;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 2rem;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--body);
  font-size: 0.88rem;
  font-weight: 500;
  padding: 0.75rem 1.6rem;
  border-radius: var(--radius);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s ease;
  background: var(--accent);
  color: #fff;
  border: none;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(30,58,95,.2);
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="card">
  <div class="glitch-code">404</div>
  <h1 class="title">Lost in Transit</h1>
  <p class="desc">The page you are looking for has either been moved, deleted, or does not exist in our system. Let's redirect you back to the main supply chain.</p>
  <a href="./index.html" class="btn">Return to Portfolio &rarr;</a>
</div>
<script>
  // Sync dark theme from localStorage
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
  }
</script>
</body>
</html>
